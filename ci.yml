name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  # ── Run tests on every push and PR ─────────────────────────────────────────
  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [18, 20]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dev dependencies
        run: npm install

      - name: Run tests
        run: npm test

  # ── Package .vsix on every push to main (for manual download) ──────────────
  package:
    name: Package .vsix
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Convert SVG icon to PNG
        run: |
          npm install --save-dev svgexport
          npx svgexport icon.svg icon.png 128:128

      - name: Package extension
        run: npm run package

      - name: Upload .vsix artifact
        uses: actions/upload-artifact@v4
        with:
          name: safepaste-vsix
          path: "*.vsix"
          retention-days: 30

  # ── Publish to VS Code Marketplace on version tag (v1.0.0, v1.1.0, etc.) ──
  publish:
    name: Publish to Marketplace
    needs: test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Convert SVG icon to PNG
        run: |
          npm install --save-dev svgexport
          npx svgexport icon.svg icon.png 128:128

      - name: Publish to VS Code Marketplace
        run: npm run publish
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX (open-source registry)
        run: |
          npm run package
          npm run publish:openvsx
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}